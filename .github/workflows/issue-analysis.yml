name: Issue Analysis

on:
  issues:
    types: [opened]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client & run migrations
        run: |
          npx prisma generate
          npx prisma migrate deploy

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start dev server
        run: npm run dev &
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Wait for server to be ready
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Analyze issue with Claude + Playwright
        id: analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          mkdir -p ~/.claude

          # Write MCP config using python to avoid YAML/heredoc indentation issues
          python3 -c "
          import json, os
          config = {
            'mcpServers': {
              'playwright': {
                'command': 'npx',
                'args': ['@playwright/mcp@latest', '--browser', 'chromium', '--headless']
              }
            }
          }
          with open(os.path.expanduser('~/.claude/settings.json'), 'w') as f:
              json.dump(config, f, indent=2)
          "

          # Write prompt using python to handle multiline content safely
          python3 -c "
          import os
          number = os.environ['ISSUE_NUMBER']
          title = os.environ['ISSUE_TITLE']
          body = os.environ['ISSUE_BODY']
          prompt = f'''You are a senior engineer triaging a GitHub issue for the uigen project.

          Issue #{number}: {title}

          Issue body:
          {body}

          The app is running at http://localhost:3000.

          Steps:
          1. Use Playwright MCP to open the app and try to reproduce the reported issue.
          2. Read the relevant source files to identify the root cause.
          3. Write a structured comment for the GitHub issue with:
             - **Summary** of what you found
             - **Root cause** (file + line if possible)
             - **Steps to reproduce** (confirmed or not)
             - **Suggested fix**

          Be concise and technical. Format as Markdown.'''

          with open('/tmp/prompt.txt', 'w') as f:
              f.write(prompt)
          "

          # Run Claude with prompt via stdin
          claude --print --allowedTools "mcp__playwright__*,Read,Bash" \
            < /tmp/prompt.txt \
            > /tmp/analysis.md

          echo "=== Analysis ==="
          cat /tmp/analysis.md

      - name: Post analysis as issue comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s /tmp/analysis.md ]; then
            BODY="$(cat /tmp/analysis.md)"
          else
            BODY="⚠️ Claude analysis failed to produce output. Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
          fi

          gh issue comment "${{ github.event.issue.number }}" \
            --repo "${{ github.repository }}" \
            --body "$BODY"
